
server:
  port: 4004

spring:
  cloud:
    gateway:
      routes:
        - id: patient-service-route
          uri: http://patient-service:4000
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1
          # REST CLIENT/FRONTEND -> http://localhost:4000/api/patients
          # API GATEWAY -> http://patient-service:4000/patients
          # PATIENT SERVICE (SPRING BOOT APP) -> /patients - Patients Array
        - id: api-docs-patient-service
          uri: http://patient-service:4000
          predicates:
            - Path=/api-docs/patients
          filters:
            - RewritePath=/api-docs/patients, /v3/api-docs
          #REST-CLIENT -> http://localhost:4004/api-docs/patients
          #API-GATEWAY -> http://patient-service:4000/v3/api-docs




#
#  This file is the heart of your API Gateway. Think of it as a reverse proxy with routing rules.
#
#  Without a gateway, the client has to know where every microservice lives.
#
#  Frontend
#  │
#  ├────────► Patient Service (4000)
#  ├────────► Billing Service (4001)
#  ├────────► Analytics Service (4002)
#  └────────► Notification Service (4003)
#
#With a gateway:
#
#  Frontend
#  │
#  ▼
#  API Gateway (4004)
#  │
#  ├────────► Patient Service
#  ├────────► Billing Service
#  ├────────► Analytics Service
#  └────────► Notification Service
#
#  The frontend only talks to one server.
#
#  server.port
#server:
#  port: 4004
#
#  This starts the gateway itself on port 4004.
#
#  So instead of
#
#  localhost:4000
#  localhost:4001
#  localhost:4002
#
#  the client always talks to
#
#  localhost:4004
#  spring.cloud.gateway
#
#  Everything inside
#
#spring:
#  cloud:
#    gateway:
#
#  configures Spring Cloud Gateway.
#
#Think of it as saying:
#
#  "Whenever a request comes in, here are the rules for where to send it."
#
#  routes
#routes:
#
#  A route is exactly like a route in networking.
#
#Each one answers:
#
#  "If the request matches this condition, where should I send it?"
#
#  Route 1
#- id: patient-service-route
#
#  The id is simply a name.
#
#  Spring uses it internally.
#
#  You can call it
#
#  patient-route
#
#  or
#
#  patients
#
#  It doesn't affect routing.
#
#  uri
#uri: http://patient-service:4000
#
#  This tells Gateway where to forward requests.
#
#  Notice it uses
#
#  patient-service
#
#  instead of
#
#  localhost
#
#  Because all your containers are on the same Docker network.
#
#  Docker DNS resolves
#
#  patient-service
#
#  to
#
#  172.xx.xx.xx
#
#  internally.
#
#  Predicate
#
#  This is probably the most important concept.
#
#predicates:
#  - Path=/api/patients/**
#
#  A predicate is simply a condition.
#
#  Think of it like Java.
#
#  if(request.startsWith("/api/patients"))
#
#  then
#
#  Forward to patient-service
#
#  The
#
#  **
#
#  means
#
#  Match everything after it.
#
#  So
#
#  /api/patients
#
#  matches.
#
#  So does
#
#  /api/patients/123
#
#  and
#
#  /api/patients/search
#
#  and
#
#  /api/patients/delete/10
#  Filter
#
#  Now suppose the frontend requests
#
#  GET
#
#  /api/patients/10
#
#  The Patient Service actually exposes
#
#  GET
#
#  /patients/10
#
#  Notice
#
#  /api
#
#  doesn't exist in the service.
#
#  So the gateway removes it.
#
#filters:
#  - StripPrefix=1
#
#  StripPrefix removes path segments.
#
#  The path
#
#  /api/patients/10
#
#  contains
#
#  api
#  patients
#  10
#
#  StripPrefix=1 removes the first segment.
#
#Result:
#
#  /patients/10
#
#  Then Gateway sends
#
#  http://patient-service:4000/patients/10
#
#  to the service.
#
#  Flow
#
#  Client
#
#  GET
#
#  http://localhost:4004/api/patients/10
#
#  ↓
#
#  Gateway
#
#  matches
#
#  Path=/api/patients/**
#
#  ↓
#
#  Gateway removes
#
#  api
#
#  ↓
#
#  Forwards
#
#  http://patient-service:4000/patients/10
#
#  ↓
#
#  Patient Service
#
#  @GetMapping("/patients/{id}")
#
#  returns response.
#
#  ↓
#
#  Gateway sends response back.
#
#  The client never knows where Patient Service is running.
#
#  Second Route
#
#  This one is for Swagger.
#
#  /api-docs/patients
#
#  is a fake endpoint.
#
#  Your Patient Service actually exposes
#
#  /v3/api-docs
#
#  So Gateway rewrites it.
#
#  RewritePath=/api-docs/patients, /v3/api-docs
#
#  Meaning
#
#  Incoming
#
#  /api-docs/patients
#
#  becomes
#
#  /v3/api-docs
#
#  before forwarding.
#
#Flow:
#
#  Browser
#
#  GET
#
#  localhost:4004/api-docs/patients
#
#  ↓
#
#  Gateway
#
#  RewritePath
#
#  ↓
#
#  /v3/api-docs
#
#  ↓
#
#  Patient Service
#
#  localhost:4000/v3/api-docs
#
#  ↓
#
#  Returns OpenAPI JSON.
#
#  Why use StripPrefix but RewritePath?
#
#  Because they're solving different problems.
#
#  StripPrefix
#
#  Very simple.
#
#  /api/patients/123
#
#  ↓
#
#  remove first part
#
#  ↓
#
#  /patients/123
#  RewritePath
#
#  Completely changes the URL.
#
#  /api-docs/patients
#
#  ↓
#
#  /v3/api-docs
#
#  They're not related.
#
#  Why have an API Gateway at all?
#
#Without a gateway:
#
#  Frontend
#
#  ↓
#
#  Patient Service
#
#  ↓
#
#  Billing Service
#
#  ↓
#
#  Analytics Service
#
#The frontend must know:
#
#  every host
#  every port
#  every URL
#
#  If Billing moves from port 4001 to 5001, every client has to change.
#
#With a gateway:
#
#  Frontend
#
#  ↓
#
#  Gateway
#
#  ↓
#
#  Everything else
#
#  Only the gateway knows where services live.
#
#If Patient Service moves to another server, you change only:
#
#uri:
#
#  No frontend changes are needed.
#
#  This is only the beginning
#
#Spring Cloud Gateway also supports advanced features that are common in production:
#
#Authentication & Authorization: Validate JWT tokens once at the gateway instead of in every service.
#Rate limiting: Prevent abuse by limiting requests per client.
#Circuit breakers and retries: Improve resilience when downstream services are slow or unavailable.
#Request/response logging: Centralize logging for all incoming traffic.
#Load balancing: Route requests across multiple instances of the same service.
#Header manipulation: Add, remove, or modify HTTP headers.
#CORS handling: Configure cross-origin access in one place.
#Service discovery: Route dynamically using Eureka or Consul instead of fixed uri values.
#
#  For senior backend roles, understanding why an API Gateway exists and what responsibilities it centralizes is often more important than memorizing the YAML syntax. It's a key architectural component in most microservice-based systems.
#
